plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-rspec_rails

inherit_mode:
  merge:
    - Exclude

AllCops:
  NewCops: enable
  Exclude:
    - 'spec/helpers/**/*'
    - 'spec/spec_helper.rb'

Layout/LineLength:
  Max: 80
  Exclude:
    - 'spec/**/*_spec.rb'

Metrics/AbcSize:
  Max: 18

Metrics/ClassLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false

Rails/SkipsModelValidations:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Lint/UselessAccessModifier:
  ContextCreatingMethods:
    - class_methods

Layout/SpaceAroundOperators:
  EnforcedStyleForExponentOperator: 'space'
